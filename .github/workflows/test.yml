name: Test action

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Run action
        uses: ./
        id: last_status
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Validate output
        shell: bash
        run: |
          status="${{ steps.last_status.outputs.last_status }}"
          echo "Got status: ${status}"

          VALID_VALUES="success failure cancelled skipped timed_out action_required neutral stale null"

          for val in ${VALID_VALUES}; do 
            if [[ "${status}" == "${val}" ]]; then
              echo "Valid status: ${status}"
              exit 0
            fi
          done

          echo "::error::Unexpected status value: '${status}'"
          exit 1
